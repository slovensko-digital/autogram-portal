      contracts:
        title: "My Documents"
        intro: "The \"My Documents\" section shows all individual documents (PDF, XML, ASiC-E\u2026) uploaded to your account. You can filter documents by status and sort them by date."
        states_title: "Document States"
        states:
          awaiting:
            label: "Awaiting Signature"
            description: "The document has been uploaded but does not yet contain any signature."
            badge_class: "bg-yellow-100 text-yellow-800"
            dot_class: "bg-yellow-500"
          completed:
            label: "Signed"
            description: "The document has been successfully signed."
            badge_class: "bg-green-100 text-green-800"
            dot_class: "bg-green-500"
        actions_title: "Available Document Actions"
        actions:
          sign:
            label: "Sign"
            description: "Sign the document with your own qualified signature using the Autogram app or eIdentita."
          request:
            label: "Request Signature"
            description: "Send the document to other people for signing via email — the system creates a bundle and sends invitations."
          timestamp:
            label: "Add Timestamp"
            description: "Add a qualified timestamp to a document that already has a signature without one."
          download:
            label: "Download"
            description: "Download the signed document to your device."
          delete:
            label: "Delete"
            description: "Permanently remove the document. A document that is part of a bundle cannot be deleted individually."
      bundles:
        title: "My Bundles"
        intro: "A bundle is a collection of one or more documents sent to recipients for signing. Here you will find all bundles you have created."
        lifecycle_title: "Creating a Bundle — Step by Step"
        lifecycle:
          upload:
            title: "Upload a Document"
            description: "Upload a PDF or other file via the \"New Document\" section. After uploading, select the \"Request Signature\" action."
          configure:
            title: "Set Signature Type and Format"
            description: "Choose the signature level (with or without timestamp) and the format (PAdES, XAdES, CAdES, ASiC-E)."
          recipients:
            title: "Add Recipients"
            description: "Enter the email addresses of people who should sign the document. Set the signing rule."
          send:
            title: "Send"
            description: "Recipients receive an email notification with a signing link. You can also copy the link manually."
          done:
            title: "Download Signed Documents"
            description: "Once the bundle is completed, you can download the signed file directly from the bundle detail page."
        states_title: "Bundle States"
        states:
          awaiting:
            label: "Awaiting Signature"
            description: "The bundle has been sent to recipients, but not everyone has signed yet."
            badge_class: "bg-yellow-100 text-yellow-800"
            dot_class: "bg-yellow-500"
          completed:
            label: "Completed"
            description: "All required recipients have signed the documents in the bundle."
            badge_class: "bg-green-100 text-green-800"
            dot_class: "bg-green-500"
          declined:
            label: "Declined"
            description: "At least one recipient declined to sign."
            badge_class: "bg-red-100 text-red-800"
            dot_class: "bg-red-500"
          no_recipients:
            label: "No Recipients"
            description: "The bundle was created but has no recipients added yet."
            badge_class: "bg-gray-100 text-gray-600"
            dot_class: "bg-gray-400"
        signing_rules_title: "Signing Rules"
        signing_rules:
          all:
            label: "All Must Sign"
            description: "The bundle is completed only when all added recipients have signed."
          any:
            label: "Any One Signature Is Enough"
            description: "The bundle is completed as soon as any single recipient signs."
          threshold:
            label: "Minimum Number of Signatures"
            description: "You can set an exact number of recipients who must sign for the bundle to be considered completed."
        public_link_title: "Public Signing Link"
        public_link_description: "For each bundle you can generate a public signing link that allows anyone to sign — without being added as a recipient."
      received:
        title: "Received Bundles"
        intro: "The \"Received Bundles\" section shows all bundles you have been invited to sign — whether by email or via a public link."
        states_title: "Your States in a Received Bundle"
        states:
          awaiting:
            label: "Awaiting Signature"
            description: "You have been invited and have not yet signed."
            badge_class: "bg-yellow-100 text-yellow-800"
            dot_class: "bg-yellow-500"
          signed:
            label: "Signed"
            description: "You have successfully signed the documents in this bundle."
            badge_class: "bg-green-100 text-green-800"
            dot_class: "bg-green-500"
          declined:
            label: "Declined"
            description: "You declined to sign the documents in this bundle."
            badge_class: "bg-red-100 text-red-800"
            dot_class: "bg-red-500"
          superseded:
            label: "Superseded"
            description: "The bundle was completed without your signature — e.g. based on an \"any one\" signing rule."
            badge_class: "bg-gray-100 text-gray-600"
            dot_class: "bg-gray-400"
        decline_title: "Declining a Signature Request"
        decline_description: "During signing you may decline the signature request. The bundle sender will receive an email notification about the decline."
      signing:
        title: "Signing Documents"
        intro: "When signing a document, you choose the signature level and format. Then you select a supported signing application."
        signature_levels_title: "Signature Levels"
        signature_levels:
          baseline_b:
            label: "Without Timestamp (BASELINE_B)"
            description: "Qualified electronic signature without a timestamp. Under civil law this is equivalent to a handwritten signature."
          baseline_t:
            label: "With Timestamp (BASELINE_T)"
            description: "Qualified electronic signature with a qualified timestamp. De facto equivalent to a notarised signature. Recommended for documents requiring long-term validity."
        formats_title: "Signature Formats"
        formats:
          pades:
            label: "PAdES"
            description: "Signature embedded directly inside the PDF file. Ideal for standard PDF documents — the signed output remains a .pdf file."
          xades:
            label: "XAdES + ASiC-E"
            description: "Signature for XML documents (e.g. Slovak eForms). If needed, you can use ASiC-E as the container output."
          cades:
            label: "CAdES + ASiC-E"
            description: "The signature creates a wrapping .p7s file. If needed, you can use ASiC-E as the container output for any file format."
        methods_title: "Signing Methods"
