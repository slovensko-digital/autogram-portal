        qualified_signing_title: "Qualified signing — what to expect"
        qualified_signing_intro: "Before signing, onboarding walks you through a few checks required for creating a qualified electronic signature."
        qualified_signing_checks:
          qscd: "Select your exact QSCD device (most commonly eID, but also residence permit cards)."
          pin: "Confirm that you know your security codes (BOK/PIN/KEP PIN depending on card type)."
          cert: "Confirm that your signing certificates are issued on the card."
        qscd_cards_title: "Supported QSCD cards and compatibility"
        qscd_cards:
          eid_2024:
            label: "Slovak ID card issued after 18.12.2024"
            mode: "Mobile + desktop (NFC)"
            badge_class: "bg-green-100 text-green-800"
