        screenshot_placeholder: "Placeholder for account settings screenshot"
      federation:
        title: "Federation Between Portals"
        intro: "Autogram Portal can hand signing requests between portal instances. The origin portal keeps ownership of the bundle, while the recipient's home portal helps with local sign-in and claiming the request."
        actors_title: "Who participates"
        actors:
          origin:
            label: "Origin portal"
            description: "The portal where the sender created the bundle. It owns the recipient list, signing rules, bundle status, and final signed documents."
          home:
            label: "Home portal"
            description: "The portal where the recipient prefers to sign in. It can preview a request from another portal and claim it on behalf of the locally signed-in user."
          trust:
            label: "Trusted portal registry"
            description: "An admin-managed list of external Autogram Portal instances used when senders intentionally target recipients on other portals."
        flow_title: "How the process works"
        flow:
          setup:
            title: "Admins configure sender-side routing"
            description: "Admins register the home portals that local senders are allowed to target when creating federated recipients."
          sender:
            title: "Sender targets a remote portal"
            description: "When creating a bundle recipient, the sender can keep the recipient local or assign them to a trusted remote portal instance."
          link:
            title: "Origin portal creates the request link"
            description: "The sender still works with the usual bundle signing link on the origin portal. That URL remains the canonical reference to the request."
          preview:
            title: "Recipient opens the request on their home portal"
            description: "The recipient can paste the origin request URL into the home portal. The home portal parses the link, loads the origin portal metadata, and asks the origin portal for a preview of the request."
          claim:
            title: "Home portal claims the request"
            description: "After the recipient signs in locally, the home portal sends a portal-authenticated claim to the origin portal. If the recipient still matches, the request is active, and that home portal is the one assigned to the recipient, the origin portal accepts the claim."
          grant:
            title: "Origin portal returns a short-lived grant"
            description: "The origin portal issues a short-lived access grant and returns a sign URL containing `grant=...`. This avoids exposing long-lived cross-portal access tokens in copied links."
          sign:
            title: "Signing continues on the origin portal"
            description: "The recipient is redirected back to the origin portal, which validates the grant and continues with the standard signing flow."
          revoke:
            title: "Grants are revoked when the request changes"
            description: "If the recipient is withdrawn or the bundle is completed without them, active grants are revoked and old links stop working."
        requests_title: "Which requests and URLs are used"
        requests:
          origin_link:
            label: "Origin request URL"
            description: "The regular bundle signing URL, typically `/bundles/:bundle_uuid/sign?recipient=:recipient_uuid`. This is what the sender copies or what the recipient receives in notification emails."
          well_known:
            label: "Federation metadata"
            description: "The `/.well-known/autogram-portal.json` document advertises the issuer, portal name, public key, federation API base URL, supported capabilities, and optional email domains of a portal."
          preview_api:
            label: "Preview API request"
            description: "`GET /api/federation/v1/requests/:recipient_uuid` is used by the home portal to retrieve a human-readable preview before the recipient claims the request."
          claim_api:
            label: "Claim API request"
            description: "`POST /api/federation/v1/requests/:recipient_uuid/claim` is used by the home portal to exchange the local signed-in user identity for a short-lived sign URL on the origin portal."
          grant_url:
            label: "Grant-backed sign URL"
            description: "The claim response returns a sign URL with `grant=...`. That URL is short-lived and validated against a stored access-grant record on the origin portal."
        security_title: "Trust and security rules"
        security_points:
          explicit_trust: "Sender-side routing uses an explicitly configured trusted portal list. This is how the origin portal decides which home portal is allowed to claim a federated recipient."
          dynamic_opening: "Recipient-side pasted-link opening is more permissive: the home portal may dynamically discover an origin portal from its metadata document without a preconfigured local trust record."
          portal_auth: "Portal-to-portal API calls are authenticated with a dedicated JWT assertion containing issuer, audience, expiry, unique ID, and federation scope."
          recipient_binding: "The origin portal verifies that the claiming portal matches the portal assigned to the recipient and that the claimant email still matches the recipient email."
          source_of_truth: "Bundle completion, recipient withdrawal, superseding, and signed document storage always remain on the origin portal."
          revocation: "Short-lived access grants are revoked automatically when the request is no longer valid for that recipient."
        current_scope_title: "Current implementation scope"
        current_scope_description: "Today, federation lets a recipient paste and claim a foreign request on their own portal even if the origin portal was not preconfigured locally, but the actual signing still completes on the origin portal."
