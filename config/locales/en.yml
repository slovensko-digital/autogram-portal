        mobile:
          title: "Autogram Mobile"
          description: "Mobile applications for iOS and Android that enable qualified signatures using mobile eID solutions and qualified signature creation devices. Sign documents on the go with full portal integration."
        extension:
          title: "Autogram Extension"
          description: "Browser extension that integrates Autogram Desktop and Mobile directly into Slovak eGovernment portals. Sign documents seamlessly without leaving government websites."
        portal:
          title: "Autogram Portal"
          description: "Web-based platform for managing the complete document signing lifecycle in commercial applications. Provides validation, workflow management, and API integration for business processes."
      standards:
        title: "Built on Open Standards"
        description: "Autogram Portal is fully open-source and built on proven technologies, meeting the highest security standards while enabling transparency and community collaboration."
        eidas:
