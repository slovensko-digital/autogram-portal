  about:
    index:
      hero:
        title: "Qualified Electronic Signatures"
        title_highlight: "Made Simple"
        description_html: "<span class=\"font-semibold text-gray-900\">Open-source platform</span> for managing up to <span class=\"inline-flex items-center font-semibold text-gray-900\">eIDAS-compliant</span> electronic signatures. <span class=\"font-semibold text-gray-900\">Send documents</span> for signing, <span class=\"font-semibold text-gray-900\">integrate workflows</span> via <span class=\"font-semibold text-gray-900\">API or embedded iframe</span>, and <span class=\"font-semibold text-gray-900\">connect seamlessly</span> with multiple signing apps."
        view_on_github: "View on GitHub"
      start_using:
        title: "Start using Autogram Portal today"
        subtitle: "Choose how you want to work — with or without an account"
        no_account:
          title: "No account needed to start"
          description: "Upload documents, view content, validate signatures, and share signing links — all without registration. Perfect for quick, one-time signing tasks."
        with_account:
          title: "More with an account"
          description: "Access document history, send signature requests via email, receive notifications and webhooks when others sign, integrate via REST API and iframes, and manage all your documents in one place."
      features:
        subtitle: "eIDAS-Compatible Platform"
        title: "Complete document signing workflow"
        description: "Bridging the gap between eGovernment and commercial document signing. Send documents for signature requests, integrate signing into your existing applications, and leverage qualified signature creation devices for legally valid electronic signatures."
        send_documents:
          title: "Send Documents for Signing"
          description: "Request signatures from other people via email or link sharing. Recipients can sign documents using their qualified signature creation devices without needing to create an account."
        api_integration:
          title: "API & Iframe Integration"
          description: "Embed signing workflows directly into your applications using simple iframe integration or comprehensive REST API. Automate document signing processes in your business systems."
        qualified_signatures:
          title: "Qualified eIDAS Signatures"
          description: "Create qualified electronic signatures using government-issued eID cards and other qualified signature creation devices. Seamless integration with Autogram Desktop and Mobile apps."
        validation:
          title: "Document Validation"
          description: "Instantly verify the validity and integrity of signed documents. The system automatically checks certificates, signatures, and timestamps to ensure compliance."
        multi_party:
          title: "Multi-Party Workflows"
          description: "Manage complex signing scenarios with multiple participants. Track signature status, send reminders, and coordinate sequential or parallel signing workflows."
        visualization:
          title: "Document Visualization"
          description: "View and navigate ASiC container contents and Slovak electronic forms in XML format directly in the browser. Preview documents before signing with clear, user-friendly rendering."
      ecosystem:
        subtitle: "The Autogram Ecosystem"
        title: "Complete signing infrastructure"
        description: "Autogram Portal is part of a comprehensive open-source portfolio for qualified electronic signatures, working seamlessly with Autogram signing applications."
        desktop:
          title: "Autogram Desktop"
          description: "Desktop application for Windows, macOS, and Linux that creates qualified signatures using eID cards and other qualified signature creation devices. Connects directly to the portal for seamless signing workflows."
          learn_more: "Learn more"
        mobile:
          title: "Autogram Mobile"
          description: "Mobile applications for iOS and Android that enable qualified signatures using mobile eID solutions and qualified signature creation devices. Sign documents on the go with full portal integration."
        extension:
          title: "Autogram Extension"
          description: "Browser extension that integrates Autogram Desktop and Mobile directly into Slovak eGovernment portals. Sign documents seamlessly without leaving government websites."
        portal:
          title: "Autogram Portal"
          description: "Web-based platform for managing the complete document signing lifecycle in commercial applications. Provides validation, workflow management, and API integration for business processes."
      standards:
        title: "Built on Open Standards"
        description: "Autogram Portal is fully open-source and built on proven technologies, meeting the highest security standards while enabling transparency and community collaboration."
        eidas:
          title: "eIDAS Regulation"
          description: "Qualified electronic signatures according to EU eIDAS have strong legal validity across all member states, bridging the gap between eGovernment and commercial use."
        open_source:
          title: "Open Source"
          description: "Fully open-source platform supported by NLNet organization. Transparent, auditable, and community-driven development ensuring trust and continuous improvement."
        api:
          title: "REST API & Webhooks"
          description: "Comprehensive REST API for seamless integration into your applications. Standard Webhooks support enables real-time notifications for signature events and workflow automation."
      how_it_works:
        subtitle: "Process"
        title: "How it works"
        step_1:
          title: "Upload your document"
          description: "Select the PDF or other document you want to have signed."
        step_2:
          title: "Add recipients"
          description: "Enter the email addresses of the people who need to sign the document."
        step_3:
          title: "Choose signature type"
          description: "Choose between a qualified electronic signature with or without a timestamp."
        step_4:
          title: "Send and wait"
          description: "Send the document to recipients and wait for required amount of signatures."
        step_5:
          title: "Download signed document"
          description: "Once the recipients have signed, download the completed signed document."
      faq:
        subtitle: "FAQ"
        title: "Frequently asked questions"
        items:
          account:
            question: "Do I need an account to sign a document?"
            answer: "No. Recipients can sign documents without registering, directly via the link they receive by email. An account is only needed for senders who want to track document history, send signature requests, and use advanced features. An account is also not required if you only want to sign and validate documents yourself."
          formats:
            question: "What file formats are supported?"
            answer: "We primarily work with PDF documents. XML documents for Slovak electronic forms, ASiC-E containers, and other common formats are also supported. Exact list: .pdf, .xml, .xdcf, .asice, .txt, .png, .jpg, .jpeg"
          signature_types:
            question: "What is the difference between a qualified electronic signature with and without a timestamp?"
            answer: "A qualified electronic signature without a timestamp is equivalent to a handwritten signature under Slovak civil law. By adding a qualified timestamp, the signature becomes de facto equivalent to a notarised signature."
          recipients_install:
            question: "Do recipients need to install anything?"
            answer: "Recipients need an application for creating qualified signatures, such as Autogram Desktop, Autogram Mobile, or eIdentita. Depending on the exact card/ID card, using a computer and a physical card reader may be required."
          multiple_signers:
            question: "Can I send a document to multiple people for signing?"
            answer: "Yes. You can add any number of recipients. The system will track who has already signed and notify you when everyone has signed the document. You can also define how many recipients must sign for the bundle to be considered completed."
          storage:
            question: "How long are documents stored?"
            answer: "Documents and bundles of signed-in users are stored until the user deletes them. Documents and bundles of non-signed-in users are stored for at most 60 minutes."
          open_source:
            question: "Is Autogram Portal free and open-source?"
            answer: "Yes. Autogram Portal is a fully open-source project (EUPL licence) available on GitHub. You can run it on your own infrastructure. Development is supported by the NLNet organisation."
      cta:
        title: "Ready to get started?"
        subtitle: "Try Autogram Portal now or explore the source code on GitHub."
        start_signing: "Start signing documents"
        view_github: "View on GitHub"

