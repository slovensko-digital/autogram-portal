        screenshot_file_hint: "File: /public/docs/screenshots/signing-app-selection.png"
        screenshot_placeholder: "Placeholder for signing screenshot"
      account:
        title: "Account Settings"
        intro: "In account settings (gear icon in the left menu), you manage basic profile details and security options."
        items:
          name:
            label: "Name"
            description: "Your display name, visible to senders and recipients in notification emails."
          email:
            label: "Email"
            description: "Your login email is displayed as read-only in settings and cannot be changed there."
          login:
            label: "Sign-in Methods"
            description: "Sign in is available via Google OAuth or a one-time email link (magic link)."
          delete_account:
            label: "Delete Account"
