        decline_description: "Pri podpisovaní môžete podpis odmietnuť. Odosielateľ balíka dostane emailovú notifikáciu o odmietnutí."
      signing:
        title: "Podpisovanie dokumentov"
        intro: "Pri podpisovaní dokumentu vyberiete úroveň podpisu a formát. Následne si zvolíte podporovanú podpisovú aplikáciu."
        signature_levels_title: "Úrovne podpisu"
        signature_levels:
          baseline_b:
            label: "Bez časovej pečiatky (BASELINE_B)"
            description: "Kvalifikovaný elektronický podpis bez časovej pečiatky. Podľa Občianskeho zákonníka je ekvivalentom vlastnoručného podpisu."
          baseline_t:
            label: "S časovou pečiatkou (BASELINE_T)"
            description: "Kvalifikovaný elektronický podpis s časovou pečiatkou. De facto ekvivalent overeného podpisu. Odporúčané pre dokumenty s dlhšou platnosťou."
        formats_title: "Formáty podpisov"
        formats:
          pades:
            label: "PAdES"
            description: "Podpis vložený priamo do PDF súboru. Ideálne pre bežné PDF dokumenty — podpísaný výstup zostane .pdf."
          xades:
            label: "XAdES + ASiC-E"
            description: "Podpis pre XML dokumenty (napr. slovenské eFormuláre). Pri potrebe kontajnera môžete použiť ASiC-E výstup."
          cades:
            label: "CAdES + ASiC-E"
            description: "Podpis vytvorí obalový .p7s súbor. Pri potrebe kontajnera môžete použiť ASiC-E výstup pre ľubovoľný formát súboru."
        methods_title: "Metódy podpisovania"
        methods:
          autogram_desktop:
            label: "Autogram na počítači"
            description: "Desktopová aplikácia pre Windows, macOS a Linux, ktorá komunikuje s čipovou kartou alebo eID zariadením zapojeným do počítača."
            links:
              download:
                label: "Stiahnuť Autogram"
                url: "https://autogram.slovensko.digital"
          autogram_mobile:
            label: "Autogram v mobile (AVM)"
            description: "Mobilná aplikácia pre iOS a Android. Podpisovanie cez smartfón pomocou mobilného eID."
            links:
              info:
                label: "Viac info a stiahnutie"
                url: "https://autogram.slovensko.digital"
          eidentita:
            label: "eIdentita"
            description: "Slovenská štátna aplikácia pre mobilné podpisovanie. Dostupná na App Store a Google Play."
            links:
              ios:
                label: "Stiahnuť z App Store"
                url: "https://apps.apple.com/sk/app/eidentita/id6739350147"
              android:
                label: "Stiahnuť z Google Play"
                url: "https://play.google.com/store/apps/details?id=sk.minv.eidentita"
          podpisuj:
            label: "Podpisuj alebo iné samostatné aplikácie"
            description: "Dostupné len pri podpisovaní jednotlivých dokumentov bez časovej pečiatky a iba na počítači. Stiahnite si dokument, podpíšte ho v samostatnej aplikácii (napr. Podpisuj) a podpísaný dokument nahrajte späť."
            links:
              download:
                label: "Stiahnuť Podpisuj"
                url: "https://www.podpisuj.sk/download"
        qualified_signing_title: "Kvalifikované podpisovanie — čo vás čaká"
        qualified_signing_intro: "Pred samotným podpisom vás onboarding prevedie niekoľkými kontrolami, aby ste mohli úspešne vytvoriť kvalifikovaný elektronický podpis."
        qualified_signing_checks:
          qscd: "Výber konkrétneho QSCD zariadenia (najčastejšie eID, ale aj doklad o pobyte)."
          pin: "Potvrdenie, že poznáte bezpečnostné kódy (BOK/PIN/KEP PIN podľa typu dokladu)."
          cert: "Potvrdenie, že máte na doklade vydané podpisové certifikáty."
        qscd_cards_title: "Podporované QSCD karty a kompatibilita"
