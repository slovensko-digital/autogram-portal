        description_b: "Bezpečnostný osobný kód (BOK) je 6-miestne číslo, ktoré slúži na prihlasovanie sa na slovensko.sk, iné štátne portály a na všetky dôležité úkony spojené s občianskym preukazom. Toto číslo nikomu nikdy neprezrádzajte a bezpečne si ho uchovajte."
        no_pin_title: "Nepoznáte BOK?"
