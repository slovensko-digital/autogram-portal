        screenshot_title: "Ukážka obrazovky"
        screenshot_description: "Odporúčame sem doplniť screenshot výberu aplikácie a kroku podpisovania dokumentu."
        screenshot_file_hint: "Súbor: /public/docs/screenshots/signing-app-selection.png"
        screenshot_placeholder: "Miesto pre screenshot podpisovania"
      account:
        title: "Nastavenia účtu"
        intro: "V nastaveniach účtu (ikona ozubeného kolieska v ľavom menu) spravujete základné údaje profilu a bezpečnostné možnosti."
        items:
          name:
            label: "Meno"
            description: "Vaše zobrazované meno, ktoré vidia odosielatelia a príjemcovia v notifikačných emailoch."
          email:
            label: "Email"
            description: "Prihlasovací email je v nastaveniach iba zobrazený (read-only) a nie je možné ho meniť."
          login:
            label: "Spôsoby prihlásenia"
            description: "Prihlásenie je možné cez Google OAuth alebo jednorazový odkaz (magic link) zaslaný na email."
          delete_account:
            label: "Zmazať účet"
            description: "V sekcii Danger Zone môžete účet natrvalo zmazať po potvrdení bezpečnostnej frázy."
        screenshot_title: "Ukážka obrazovky"
        screenshot_description: "Odporúčame sem doplniť screenshot stránky nastavení s vyznačenou sekciou Danger Zone."
        screenshot_file_hint: "Súbor: /public/docs/screenshots/account-danger-zone.png"
        screenshot_placeholder: "Miesto pre screenshot nastavení účtu"
      federation:
        title: "Federácia medzi portálmi"
        intro: "Autogram Portal dokáže odovzdávať požiadavky na podpis medzi inštanciami portálu. Pôvodný portál zostáva vlastníkom balíka, zatiaľ čo domáci portál adresáta pomáha s lokálnym prihlásením a prevzatím požiadavky."
        actors_title: "Kto sa procesu zúčastňuje"
        actors:
          origin:
            label: "Pôvodný portál"
            description: "Portál, na ktorom odosielateľ vytvoril balík. Vlastní zoznam adresátov, pravidlá podpisovania, stav balíka aj finálne podpísané dokumenty."
          home:
            label: "Domáci portál"
            description: "Portál, na ktorom sa adresát preferuje prihlasovať. Vie zobraziť náhľad požiadavky z iného portálu a prevziať ju v mene lokálne prihláseného používateľa."
          trust:
            label: "Zoznam dôveryhodných portálov"
            description: "Administrátorom spravovaný zoznam externých inštancií Autogram Portálu používaný vtedy, keď odosielateľ cielene priraďuje adresáta na iný portál."
        flow_title: "Ako celý proces funguje"
        flow:
          setup:
            title: "Administrátori nastavia smerovanie pre odosielateľov"
            description: "Administrátori zaregistrujú domáce portály, na ktoré môžu lokálni odosielatelia cielene smerovať federovaných adresátov."
          sender:
            title: "Odosielateľ vyberie vzdialený portál"
            description: "Pri vytváraní adresáta v balíku môže odosielateľ ponechať adresáta lokálneho alebo ho priradiť ku konkrétnej dôveryhodnej vzdialenej inštancii portálu."
          link:
            title: "Pôvodný portál vytvorí odkaz na požiadavku"
            description: "Odosielateľ stále pracuje s bežným podpisovým odkazom balíka na pôvodnom portáli. Táto URL zostáva kanonickou referenciou na požiadavku."
          preview:
            title: "Adresát otvorí požiadavku na svojom domácom portáli"
            description: "Adresát môže vložiť URL pôvodnej požiadavky do domáceho portálu. Domáci portál odkaz spracuje, načíta metadáta pôvodného portálu a vyžiada si náhľad požiadavky."
          claim:
            title: "Domáci portál prevezme požiadavku"
            description: "Po lokálnom prihlásení adresáta odošle domáci portál portálom autentifikovanú požiadavku na prevzatie. Ak sa adresát stále zhoduje, požiadavka je aktívna a domáci portál je ten, ktorý bol priradený adresátovi, pôvodný portál ju prijme."
          grant:
            title: "Pôvodný portál vráti krátkodobý grant"
            description: "Pôvodný portál vydá krátkodobý prístupový grant a vráti podpisovú URL s parametrom `grant=...`. Tým sa vyhne zdieľaniu dlhodobých tokenov v kopírovaných odkazoch."
          sign:
            title: "Podpis pokračuje na pôvodnom portáli"
            description: "Adresát je presmerovaný späť na pôvodný portál, ktorý grant overí a pokračuje štandardným podpisovým procesom."
          revoke:
            title: "Granty sa rušia pri zmene požiadavky"
            description: "Ak je adresát stiahnutý alebo je balík dokončený bez neho, aktívne granty sa zrušia a staré odkazy prestanú fungovať."
        requests_title: "Aké URL a požiadavky sa používajú"
        requests:
          origin_link:
            label: "Pôvodná URL požiadavky"
            description: "Bežná podpisová URL balíka, typicky `/bundles/:bundle_uuid/sign?recipient=:recipient_uuid`. Túto URL odosielateľ kopíruje alebo ju adresát dostane v notifikačnom emaile."
          well_known:
            label: "Federované metadáta"
            description: "Dokument `/.well-known/autogram-portal.json` zverejňuje issuer, názov portálu, verejný kľúč, základ federovaného API, podporované schopnosti a voliteľné emailové domény portálu."
          preview_api:
            label: "API požiadavka na náhľad"
            description: "`GET /api/federation/v1/requests/:recipient_uuid` používa domáci portál na získanie čitateľného náhľadu požiadavky ešte pred jej prevzatím."
          claim_api:
            label: "API požiadavka na prevzatie"
            description: "`POST /api/federation/v1/requests/:recipient_uuid/claim` používa domáci portál na výmenu lokálne prihláseného používateľa za krátkodobú podpisovú URL na pôvodnom portáli."
          grant_url:
            label: "Podpisová URL s grantom"
            description: "Odpoveď na prevzatie vracia podpisovú URL s parametrom `grant=...`. Táto URL má krátku platnosť a overuje sa voči uloženému prístupovému grantu na pôvodnom portáli."
        security_title: "Pravidlá dôvery a bezpečnosti"
        security_points:
          explicit_trust: "Smerovanie od odosielateľa používa explicitne nakonfigurovaný zoznam dôveryhodných portálov. Takto pôvodný portál rozhoduje, ktorý domáci portál smie prevziať federovaného adresáta."
          dynamic_opening: "Otvorenie vloženého cudzieho odkazu na domácom portáli je voľnejšie: domáci portál si môže pôvodný portál objaviť dynamicky cez jeho metadátový dokument aj bez lokálneho záznamu dôvery."
          portal_auth: "Portálové API volania sú autentifikované samostatným JWT tvrdením s issuerom, audience, exspiráciou, unikátnym ID a federovaným scope."
          recipient_binding: "Pôvodný portál overuje, že preberajúci portál sa zhoduje s portálom priradeným adresátovi a že email preberajúceho používateľa sa stále zhoduje s emailom adresáta."
          source_of_truth: "Dokončenie balíka, stiahnutie adresáta, superseding aj uloženie podpísaných dokumentov zostávajú vždy na pôvodnom portáli."
          revocation: "Krátkodobé prístupové granty sa rušia automaticky, keď požiadavka už pre daného adresáta nie je platná."
        current_scope_title: "Rozsah aktuálnej implementácie"
        current_scope_description: "Federácia dnes umožňuje adresátovi vložiť a prevziať cudziu požiadavku na vlastnom portáli aj vtedy, keď pôvodný portál nebol lokálne vopred nastavený, ale samotné podpisovanie sa stále dokončuje na pôvodnom portáli."
      integration:
        title: "API a SDK"
        intro: "Ak chcete Autogram Portal integrovať do vlastnej aplikácie, použite SDK ukážku a API dokumentáciu."
        links:
          sdk_example:
            label: "SDK príklad"
            description: "Interaktívna ukážka použitia SDK v prehliadači."
            url: "/sdk-example.html"
          api_docs:
            label: "Swagger / API v1"
            description: "Prehľad API endpointov a ich použitie v rámci /api/v1."
            url: "/api/v1"

