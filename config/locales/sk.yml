        description_html: "<span class=\"font-semibold text-gray-900\">Open-source platforma</span> pre správu <span class=\"inline-flex items-center font-semibold text-gray-900\">eIDAS-kompatibilných</span> elektronických podpisov. <span class=\"font-semibold text-gray-900\">Posielajte dokumenty</span> na podpis, <span class=\"font-semibold text-gray-900\">integrujte pracovné postupy</span> cez <span class=\"font-semibold text-gray-900\">API alebo vložený iframe</span> a <span class=\"font-semibold text-gray-900\">bezproblémovo sa pripojte</span> k viacerým podpisovacím aplikáciám."
        view_on_github: "Zobraziť na GitHube"
      start_using:
        title: "Začnite používať Autogram Portal dnes"
        subtitle: "Vyberte si, ako chcete pracovať — s účtom alebo bez neho"
        no_account:
          title: "Na začatie nie je potrebný účet"
          description: "Nahrávajte dokumenty, prezerajte obsah, overujte podpisy a zdieľajte odkazy na podpisovanie — všetko bez registrácie. Ideálne pre rýchle, jednorazové podpisovanie."
        with_account:
          title: "Viac s účtom"
          description: "Prístup k histórii dokumentov, posielanie žiadostí o podpis e-mailom, prijímanie notifikácií a webhookov, keď ostatní podpisujú, integrácia cez REST API a iframe a správa všetkých vašich dokumentov na jednom mieste."
      features:
        subtitle: "eIDAS-kompatibilná platforma"
        title: "Kompletný pracovný tok podpisovania dokumentov"
        description: "Preklenieme priepasť medzi eGovernment a komerčným podpisovaním dokumentov. Posielajte dokumenty na podpisovanie, integrujte podpisovanie do existujúcich aplikácií a využívajte kvalifikované zariadenia na vytváranie podpisov pre právne platné elektronické podpisy."
        send_documents:
          title: "Posielajte dokumenty na podpísanie"
          description: "Požiadajte o podpisy od iných ľudí cez e-mail alebo zdieľanie odkazu. Príjemcovia môžu podpisovať dokumenty pomocou svojich kvalifikovaných zariadení na vytváranie podpisov bez potreby vytvárať účet."
        api_integration:
          title: "API a iframe integrácia"
          description: "Vložte pracovné toky podpisovania priamo do svojich aplikácií pomocou jednoduchej iframe integrácie alebo komplexného REST API. Automatizujte procesy podpisovania dokumentov vo vašich obchodných systémoch."
        qualified_signatures:
          title: "Kvalifikované eIDAS podpisy"
          description: "Vytvárajte kvalifikované elektronické podpisy pomocou vládou vydaných eID kariet a iných kvalifikovaných zariadení na vytváranie podpisov. Bezproblémová integrácia s aplikáciami Autogram a Autogram v mobile."
        validation:
          title: "Overovanie dokumentov"
          description: "Okamžite overujte platnosť a integritu podpísaných dokumentov. Systém automaticky kontroluje certifikáty, podpisy a časové pečiatky, aby zabezpečil súlad."
        multi_party:
          title: "Viacstranné pracovné toky"
          description: "Spravujte zložité scenáre podpisovania s viacerými účastníkmi. Sledujte stav podpisov, posielajte pripomienky a koordinujte sekvenčné alebo paralelné pracovné toky podpisovania."
        visualization:
          title: "Vizualizácia dokumentov"
          description: "Prezerajte a prechádzajte obsah ASiC kontajnerov a slovenské elektronické formuláre vo formáte XML priamo v prehliadači. Náhľad dokumentov pred podpísaním s jasným, užívateľsky prívetivým zobrazením."
      ecosystem:
        subtitle: "Ekosystém Autogram"
        title: "Kompletná infraštruktúra na podpisovanie"
        description: "Autogram Portal je súčasťou komplexného open-source portfólia pre kvalifikované elektronické podpisy, ktoré bezproblémovo funguje s podpisovacími aplikáciami Autogram."
        desktop:
          title: "Autogram na počítači"
          description: "Desktopová aplikácia pre Windows, macOS a Linux, ktorá vytvára kvalifikované podpisy pomocou eID kariet a iných kvalifikovaných zariadení na vytváranie podpisov. Pripája sa priamo k portálu pre bezproblémové pracovné toky podpisovania."
          learn_more: "Dozvedieť sa viac"
        mobile:
          title: "Autogram v mobile"
          description: "Mobilné aplikácie pre iOS a Android, ktoré umožňujú kvalifikované podpisy pomocou mobilných eID riešení a kvalifikovaných zariadení na vytváranie podpisov. Podpisujte dokumenty na cestách s plnou integráciou portálu."
        extension:
          title: "Autogram Extension"
          description: "Rozšírenie prehliadača, ktoré integruje Autogram na počítači a v mobile priamo do slovenských eGovernment portálov. Podpisujte dokumenty bezproblémovo bez opustenia vládnych webových stránok."
        portal:
          title: "Autogram Portal"
          description: "Webová platforma na správu kompletného životného cyklu podpisovania dokumentov v komerčných aplikáciách. Poskytuje overovanie, správu pracovných tokov a API integráciu pre obchodné procesy."
      standards:
        title: "Postavené na otvorených štandardoch"
        description: "Autogram Portal je plne open-source a postavený na overených technológiách, spĺňa najvyššie bezpečnostné štandardy a umožňuje transparentnosť a spoluprácu s komunitou."
        eidas:
          title: "Nariadenie eIDAS"
          description: "Kvalifikované elektronické podpisy podľa nariadenia EÚ eIDAS majú silnú právnu platnosť vo všetkých členských štátoch a preklenujú priepasť medzi eGovernment a komerčným použitím."
        open_source:
          title: "Open Source"
          description: "Plne open-source platforma podporovaná organizáciou NLNet. Transparentný, auditovateľný a komunitou riadený vývoj zabezpečujúci dôveru a neustále zlepšovanie."
        api:
          title: "REST API a Webhooky"
          description: "Komplexné REST API pre bezproblémovú integráciu do vašich aplikácií. Štandardná podpora Webhookov umožňuje notifikácie v reálnom čase pre udalosti podpisovania a automatizáciu pracovných tokov."
      how_it_works:
        subtitle: "Proces"
        title: "Ako to funguje"
        step_1:
          title: "Nahrajte dokument"
          description: "Vyberte PDF alebo iný dokument, ktorý chcete podpísať."
        step_2:
          title: "Pridajte príjemcov"
          description: "Zadajte e-mailové adresy osôb, ktoré majú dokument podpísať."
        step_3:
          title: "Vyberte typ podpisu"
          description: "Zvoľte kvalifikovaný elektronický podpis s časovou pečiatkou alebo bez nej."
        step_4:
          title: "Odošlite a čakajte"
          description: "Odošlite balík adresátom a počkajte, kým ho podpíše požadovaný počet."
        step_5:
          title: "Stiahnite podpísaný dokument"
          description: "Po dokončení podpisovania si stiahnite hotový podpísaný dokument."
      faq:
        subtitle: "FAQ"
        title: "Časté otázky"
        items:
          account:
            question: "Potrebujem účet na podpísanie dokumentu?"
            answer: "Nie. Príjemcovia môžu dokumenty podpisovať bez registrácie priamo cez odkaz, ktorý dostanú emailom. Účet je potrebný len pre odosielateľov, ktorí chcú sledovať históriu dokumentov, posielať žiadosti o podpis a využívať pokročilé funkcie. Rovnako nie je účet potrebný, ak chcete iba vy sami podpisovať a overovať dokumenty."
          formats:
            question: "Aké formáty súborov sú podporované?"
            answer: "Primárne pracujeme s PDF dokumentmi. Okrem toho sú podporované XML dokumenty slovenských elektronických formulárov, ASiC-E kontajnery a ďalšie bežné formáty. Presný zoznam: .pdf, .xml, .xdcf, .asice, .txt, .png, .jpg, .jpeg"
          signature_types:
            question: "Aký je rozdiel medzi kvalifikovaným elektronickým podpisom s časovou pečiatkou a bez nej?"
            answer: "Kvalifikovaný elektronický podpis bez časovej pečiatky je podľa občianskeho zákonníka ekvivalentom vlastnoručného podpisu. Pridaním kvalifikovanej časovej pečiatky sa dosiahne to, že podpis je de facto rovnocenným overeného podpisu."
          recipients_install:
            question: "Musia si príjemcovia niečo inštalovať?"
            answer: "Príjemca potrebuje aplikáciu pre vytvárenie kvalifikovaných podpisov ako Autogram na počítači, Autogram v mobile alebo eIdentita. V závislosti od presnej karty/občianskeho preukazu môže byť nutné použiť počítač a fyzickú čítačku kariet."
          multiple_signers:
            question: "Môžem poslať dokument na podpis viacerým ľuďom?"
            answer: "Áno. Môžete pridať ľubovoľný počet príjemcov. Systém bude sledovať, kto už podpísal, a notifikuje vás, keď všetci dokument podpíšu. Rovnako si môžete nastaviť, koľkí príjemcovia musia balík podpísať, aby bol považovaný za dokončený."
          storage:
            question: "Ako dlho sú dokumenty uložené?"
            answer: "Dokumenty a balíky prihláseného používateľa sa uchovávajú dokým ich používateľ nezmaže. Dokumenty a balíky nepríhlásených používateľov sa uchovávajú najviac 60 minút."
          open_source:
            question: "Je Autogram Portal zadarmo a open-source?"
            answer: "Áno. Autogram Portal je plne open-source projekt (licencia EUPL) dostupný na GitHube. Môžete si ho spustiť na vlastnej infraštruktúre. Vývoj je podporovaný organizáciou NLNet."
      cta:
        title: "Pripravení začať?"
        subtitle: "Vyskúšajte Autogram Portal teraz alebo preskúmajte zdrojový kód na GitHube."
        start_signing: "Začať podpisovať dokumenty"
        view_github: "Zobraziť na GitHube"

